<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shrenix - Visual VAD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; --ink: #fbf7ef; --muted: rgba(255,250,242,.72); --line: rgba(255,247,233,.34); --glass: rgba(255,245,235,.24); --glass-strong: rgba(255,248,240,.32); --warm: #ffd157; --cyan: #60dcdf; --red: #ff816f; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; overflow-x: hidden; color: var(--ink); font-family: Poppins, sans-serif; background: #111b1c; }
    body::before { content: ""; position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 48% 83%, #fbc322 0%, rgba(255,166,31,.90) 19%, rgba(235,85,26,.76) 40%, rgba(114,30,21,.92) 66%, #11191c 100%); }
    body::after { content: ""; position: fixed; inset: 0; z-index: -1; opacity: .38; background-image: radial-gradient(rgba(255,255,255,.44) .7px, transparent .8px), radial-gradient(rgba(0,0,0,.42) .7px, transparent .9px); background-size: 4px 4px, 7px 7px; background-position: 0 0, 3px 2px; mix-blend-mode: soft-light; pointer-events: none; }
    .page { width: min(1420px, calc(100% - 34px)); min-height: calc(100vh - 34px); margin: 17px auto; padding: 20px clamp(20px, 5vw, 72px) 38px; background: linear-gradient(120deg, rgba(29,14,13,.54), rgba(16,28,34,.64)); border: 1px solid rgba(255,255,255,.05); }
    header { height: 92px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; }
    nav { display: flex; gap: 31px; padding-top: 5px; font-size: 11px; font-weight: 500; }
    nav span { cursor: default; opacity: .95; }
    .brand { margin: -13px 0 0; font-family: "Playfair Display", Georgia, serif; font-size: clamp(31px, 3.6vw, 48px); font-style: italic; font-weight: 500; letter-spacing: -2px; text-shadow: 0 2px 20px rgba(41,6,0,.3); }
    .profile { justify-self: end; width: 27px; height: 27px; margin-top: 1px; border: 1.5px solid rgba(255,255,255,.84); border-radius: 50%; position: relative; }
    .profile::before { content: ""; position:absolute; width: 7px; height: 7px; border: 1.4px solid white; border-radius:50%; left:8px; top:5px; }.profile::after{content:"";position:absolute;width:12px;height:6px;border:1.4px solid white;border-bottom:0;border-radius:9px 9px 0 0;left:5px;bottom:4px;}
    main { display: grid; grid-template-columns: minmax(0, 1.08fr) minmax(320px, .92fr); gap: 16px; max-width: 1120px; margin: 34px auto 0; }
    .left { display: grid; grid-template-rows: minmax(260px, 1fr) 205px; gap: 16px; min-height: 555px; }
    .card { background: linear-gradient(130deg, var(--glass-strong), var(--glass)); border: 1px solid var(--line); border-radius: 26px; backdrop-filter: blur(12px); box-shadow: 0 16px 45px rgba(62,21,6,.19), inset 0 1px rgba(255,255,255,.24); overflow: hidden; }
    .camera-card { padding: 18px; display: grid; grid-template-rows: auto 1fr; }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin: 0 3px 14px; }
    .eyebrow { color: rgba(255,255,255,.84); font-size: 10px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; }
    .live { display: inline-flex; align-items: center; gap: 7px; padding: 6px 10px; border-radius: 30px; background: rgba(18,31,30,.38); font-size: 10px; font-weight: 600; }.dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 11px var(--red)}
    .video { min-height: 0; position: relative; border-radius: 17px; overflow: hidden; background: rgba(6,15,17,.67); border: 1px solid rgba(255,255,255,.19); }.video img{display:block;width:100%;height:100%;object-fit:cover;min-height:235px}.metrics{position:absolute;right:12px;bottom:12px;display:flex;gap:7px}.metric{background:rgba(9,18,20,.73);backdrop-filter:blur(7px);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:6px 9px;font-size:10px}.metric b{font-weight:600;color:#fff}
    .events { padding: 17px 21px; }.events-list{height:138px;overflow:auto;padding-right:5px;scrollbar-width:thin}.event{display:grid;grid-template-columns:75px 1fr auto;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.14);font-size:11px}.event:last-child{border:0}.event-time{color:rgba(255,255,255,.65);font-variant-numeric:tabular-nums}.event-name{font-weight:600}.event-name.start{color:#c9fff3}.event-name.end{color:#ffe0b0}.event-meta{font-size:10px;color:rgba(255,255,255,.68)}
    .transcript { min-height: 555px; padding: 22px 24px; display:flex; flex-direction:column; }.transcript-title{font-family:"Playfair Display",Georgia,serif;font-size:29px;font-weight:500;font-style:italic;margin:0;letter-spacing:-.7px}.sub{margin:4px 0 20px;font-size:10px;color:var(--muted);letter-spacing:.05em}.status{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;padding:10px 12px;background:rgba(19,28,28,.24);border:1px solid rgba(255,255,255,.16);border-radius:13px}.status .dot{background:var(--cyan);box-shadow:0 0 11px var(--cyan)}.status.speaking .dot{background:var(--red);box-shadow:0 0 11px var(--red)}
    .transcript-list{flex:1;margin-top:15px;overflow:auto;padding-right:4px;scrollbar-width:thin}.utterance{border-left:2px solid rgba(255,244,226,.6);padding:2px 0 14px 12px;margin-bottom:14px}.utterance-time{font-size:10px;color:rgba(255,255,255,.58);margin-bottom:5px}.utterance-text{font-size:14px;line-height:1.68;color:#fffaf2}.partial{min-height:44px;border-top:1px solid rgba(255,255,255,.17);padding:15px 0 2px;color:rgba(255,255,255,.74);font-size:12px;font-style:italic}.empty{font-size:12px;color:rgba(255,255,255,.63);padding:18px 0}.error{color:#ffd5cc;line-height:1.5}
    /* Custom scrollbar for both lists */
    .events-list::-webkit-scrollbar, .transcript-list::-webkit-scrollbar { width: 6px; }
    .events-list::-webkit-scrollbar-track, .transcript-list::-webkit-scrollbar-track { background: transparent; }
    .events-list::-webkit-scrollbar-thumb, .transcript-list::-webkit-scrollbar-thumb { background: rgba(255,247,233,.35); border-radius: 3px; }
    .events-list::-webkit-scrollbar-thumb:hover, .transcript-list::-webkit-scrollbar-thumb:hover { background: rgba(255,247,233,.55); }
    @media (max-width: 760px){.page{width:100%;margin:0;min-height:100vh;border:0;padding:20px}.brand{font-size:35px}header{height:74px;grid-template-columns:1fr auto}nav{display:none}.profile{display:none}main{grid-template-columns:1fr;margin-top:16px}.left{min-height:0;grid-template-rows:360px 205px}.transcript{min-height:440px}.video img{min-height:0}}
  </style>
</head>
<body>
  <div class="page">
    <header><nav><span>Home</span><span>Pages</span><span>Blogs</span><span>Contact Us</span></nav><h1 class="brand">Shrenix</h1><span class="profile" aria-label="Profile"></span></header>
    <main>
      <section class="left">
        <article class="card camera-card"><div class="card-head"><span class="eyebrow">Live Vision</span><span class="live"><i class="dot"></i><span id="vision-state">Connecting</span></span></div><div class="video"><img src="/stream.mjpg" alt="Live visual VAD camera feed"><div class="metrics"><span class="metric"><b id="fps">--</b> FPS</span><span class="metric"><b id="processing">--</b> ms</span><span class="metric">signal <b id="signal">--</b></span></div></div></article>
        <article class="card events"><div class="card-head"><span class="eyebrow">Activity timeline</span><span class="eyebrow" id="track">TRACK --</span></div><div class="events-list" id="events"><div class="empty">Waiting for visual VAD events...</div></div></article>
      </section>
      <aside class="card transcript"><h2 class="transcript-title">Transcript</h2><p class="sub">WHISPER STT · VISUAL GATED</p><div class="status" id="stt-status"><i class="dot"></i><span id="stt-label">Waiting for visual speech</span></div><div class="transcript-list" id="transcript"><div class="empty">Speech segments will appear here after the primary user finishes speaking.</div></div><div class="partial" id="partial"></div></aside>
    </main>
  </div>
  <script>
    const eventBox=document.getElementById('events'), transcriptBox=document.getElementById('transcript');
    let eventKey='', transcriptKey='';
    function text(node,value){node.textContent=value}
    function updateEvents(events){const key=JSON.stringify(events);if(key===eventKey)return;eventKey=key;eventBox.replaceChildren();if(!events.length){eventBox.innerHTML='<div class="empty">Waiting for visual VAD events...</div>';return}events.forEach(e=>{const row=document.createElement('div');row.className='event';const type=e.type==='speech_start'?'SPEECH START':'SPEECH END';row.innerHTML=`<span class="event-time">${e.time}</span><span class="event-name ${e.type==='speech_start'?'start':'end'}">${type}</span><span class="event-meta">track ${e.track} · ${e.latency} ms</span>`;eventBox.append(row)})}
    function updateTranscript(items){const key=JSON.stringify(items);if(key===transcriptKey)return;transcriptKey=key;transcriptBox.replaceChildren();if(!items.length){transcriptBox.innerHTML='<div class="empty">Speech segments will appear here after the primary user finishes speaking.</div>';return}items.forEach(item=>{const el=document.createElement('article');el.className='utterance';const time=document.createElement('div');time.className='utterance-time';text(time,item.time);const content=document.createElement('div');content.className='utterance-text';text(content,item.text);el.append(time,content);transcriptBox.append(el)})}
    async function poll(){try{const r=await fetch('/api/state',{cache:'no-store'});const s=await r.json();text(document.getElementById('vision-state'),s.error?'Camera error':s.status);text(document.getElementById('fps'),s.fps);text(document.getElementById('processing'),s.processing_ms);text(document.getElementById('signal'),s.signal);text(document.getElementById('track'),s.primary_track?`TRACK ${s.primary_track}`:'TRACK --');const status=document.getElementById('stt-status');status.classList.toggle('speaking',s.speaking);text(document.getElementById('stt-label'),s.error?s.error:(s.speaking?'Listening to primary user':s.partial||'Waiting for visual speech'));text(document.getElementById('partial'),s.partial&& !s.error?`› ${s.partial}`:'');updateEvents(s.events);updateTranscript(s.transcript)}catch(err){text(document.getElementById('vision-state'),'Connection lost')}}poll();setInterval(poll,450);
  </script>
</body>
</html>
